<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::content})}">
<head>
<meta charset="UTF-8">
<title>객실 목록</title>

<style>
body {
	font-family: 'Pretendard', sans-serif;
	background: #fff;
	color: #111;
}

#roomListArea {
	max-width: 1100px;
	margin: 0 auto;
}

h1 {
	text-align: center;
	font-size: 36px;
	font-weight: 600;
	margin-bottom: 50px;
}

.room-card {
	display: flex;
	gap: 40px;
	padding: 50px 0;
	border-bottom: 1px solid #eee;
	align-items: center;
}

.room-image {
	width: 420px;
	height: 260px;
	overflow: hidden;
	border-radius: 4px;
}

.room-image img {
	width: 100%;
	height: 100%;
	object-fit: cover;
}

.room-info {
	flex: 1;
}

.room-name a {
	font-size: 24px;
	font-weight: 600;
	color: #111;
	text-decoration: none;
}

.room-name a:hover {
	text-decoration: underline;
}

.room-meta {
	margin-top: 18px;
	font-size: 14px;
	color: #666;
	line-height: 1.9;
}

.price {
	font-size: 20px;
	font-weight: 600;
	margin-top: 22px;
}

.button-group {
	margin-top: 25px;
	display: flex;
	gap: 12px;
}

.btn-reserve {
	background: #111;
	color: white;
	border: none;
	padding: 10px 30px;
	font-size: 14px;
	cursor: pointer;
}

.btn-reserve:hover {
	background: #c9a76b;
	color: #111;
}

.btn-compare {
	background: transparent;
	border: 1px solid #ccc;
	padding: 10px 20px;
	font-size: 14px;
	cursor: pointer;
}

.btn-compare:hover {
	border-color: #111;
}

.filter-wrapper {
	max-width: 1100px;
	width: 100%;
	margin: 0 auto 40px auto;
	padding: 25px 30px;
	background: #fafafa;
	border: 1px solid #eee;
	border-radius: 6px;
}

.filter-row {
	display: flex;
	align-items: center;
	gap: 20px;
}

.sort-group {
	margin-left: auto;
}

.filter-group {
	display: flex;
	gap: 15px;
	align-items: center;
	flex-wrap: wrap;
}

.filter-group select {
	padding: 8px 12px;
	border: 1px solid #ddd;
	font-size: 14px;
	min-width: 130px;
	background: white;
}

.filter-group select:focus {
	outline: none;
	border-color: #111;
}

.filter-search-btn {
	background: #111;
	color: white;
	border: none;
	padding: 8px 20px;
	font-size: 14px;
	cursor: pointer;
}

.filter-search-btn:hover {
	background: #c9a76b;
	color: #111;
}

.sort-group {
	display: flex;
	align-items: center;
	gap: 10px;
}

.sort-group select {
	padding: 8px 12px;
	border: 1px solid #ddd;
}

.title-row {
	max-width: 1100px;
	margin: 0 auto 40px auto;
	display: flex;
	justify-content: space-between;
	align-items: center;
}

.title-row h1 {
	margin: 0;
}

#currencySelect {
	padding: 6px 10px;
}

.filter-date {
	display: flex;
	align-items: center;
	gap: 10px;
	padding: 8px 12px;
	border: 1px solid #ddd;
	background: #fff;
	border-radius: 4px;
}

.filter-date input {
	border: none;
	outline: none;
}

#compareItems {
	display: flex;
	align-items: center;
	gap: 15px;
	flex-wrap: wrap;
}

.compare-table {
	width: 100%;
	border-collapse: collapse;
	margin-top: 20px;
}

.compare-table th {
	font-size: 18px;
	font-weight: 600;
	padding: 15px;
}

.compare-table td {
	padding: 14px;
	border-bottom: 1px solid #eee;
}

.compare-table tr:hover {
	background: #fafafa;
}

.compare-room-img {
	width: 150px;
	height: 100px;
	object-fit: cover;
	border-radius: 6px;
	margin-bottom: 8px;
}
</style>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
</head>
<body>
<div th:fragment="content" style="margin-top: 140px;">

	<div class="title-row">
		<h1>객실</h1>
		<select id="currencySelect" style="margin-bottom: 20px;">
			<option value="KRW">KRW</option>
			<option value="USD">USD</option>
			<option value="JPY">JPY</option>
			<option value="EUR">EUR</option>
		</select>
	</div>

	<div style="max-width: 1100px; margin: 0 auto 20px auto; text-align: right;">
		<label>
			<input type="checkbox" id="extraFeeCheck"> 세금 · 봉사료 포함 (10%)
		</label>
	</div>

	<div id="selectedDateBox" style="margin: 20px 0; font-weight: bold;"></div>

	<input type="hidden" id="checkInInput" name="check_in">
	<input type="hidden" id="checkOutInput" name="check_out">

	<div style="display: flex; justify-content: center; margin-bottom: 20px;">
		<div class="filter-wrapper">

			<div class="filter-row">
				<form id="filterForm" class="filter-group" th:action="@{/search}" method="get">

					<select name="hotel" id="hotelSelect">
						<option value="">호텔 전체</option>
						<option th:each="hotel : ${hotelList}"
								th:value="${hotel['hotel_id']}"
								th:text="${hotel['hotel_name']}"
								th:selected="${searchParams != null and (#strings.equals(#strings.toString(hotel['hotel_id']), #strings.toString(searchParams['hotel'])) or #strings.equals(#strings.toString(hotel['hotel_id']), #strings.toString(searchParams['hotelId'])))}">
						</option>
					</select>

					<input type="hidden" name="reserveType" value="room" />

					<select name="room_grade">
						<option value="">객실등급 전체</option>
						<option value="DELUXE" th:selected="${searchParams != null and searchParams['room_grade'] == 'DELUXE'}">DELUXE</option>
						<option value="PREMIER" th:selected="${searchParams != null and searchParams['room_grade'] == 'PREMIER'}">PREMIER</option>
						<option value="SUITE" th:selected="${searchParams != null and searchParams['room_grade'] == 'SUITE'}">SUITE</option>
						<option value="STANDARD" th:selected="${searchParams != null and searchParams['room_grade'] == 'STANDARD'}">STANDARD</option>
					</select>

					<select name="bed_type" id="bedTypeSelect">
						<option value="">침대타입 전체</option>
						<option value="DOUBLE" th:selected="${searchParams != null and (searchParams['bed_type'] == 'DOUBLE' or searchParams['bedType'] == 'DOUBLE')}">DOUBLE</option>
						<option value="TWIN" th:selected="${searchParams != null and (searchParams['bed_type'] == 'TWIN' or searchParams['bedType'] == 'TWIN')}">TWIN</option>
						<option value="KING" th:selected="${searchParams != null and (searchParams['bed_type'] == 'KING' or searchParams['bedType'] == 'KING')}">KING</option>
					</select>

					<select name="view_type">
						<option value="">전망 전체</option>
						<option value="CITY" th:selected="${searchParams != null and searchParams['view_type'] == 'CITY'}">CITY</option>
						<option value="RIVER" th:selected="${searchParams != null and searchParams['view_type'] == 'RIVER'}">RIVER</option>
					</select>

					<select name="capacity">
						<option value="">인원 전체</option>
						<option value="1" th:selected="${searchParams != null and #strings.equals(#strings.toString(searchParams['capacity']), '1')}">1명</option>
						<option value="2" th:selected="${searchParams != null and #strings.equals(#strings.toString(searchParams['capacity']), '2')}">2명</option>
						<option value="3" th:selected="${searchParams != null and #strings.equals(#strings.toString(searchParams['capacity']), '3')}">3명</option>
						<option value="4" th:selected="${searchParams != null and #strings.equals(#strings.toString(searchParams['capacity']), '4')}">4명 이상</option>
					</select>

				</form>

				<div class="sort-group">
					<span>정렬</span>
					<select id="sortSelect">
						<option value="" th:selected="${searchParams == null or searchParams['sort'] == null or searchParams['sort'] == ''}">기본순</option>
						<option value="priceAsc" th:selected="${searchParams != null and searchParams['sort'] == 'priceAsc'}">가격 낮은순</option>
						<option value="priceDesc" th:selected="${searchParams != null and searchParams['sort'] == 'priceDesc'}">가격 높은순</option>
					</select>
				</div>
			</div>

			<div class="filter-row" style="margin-top:15px;">
				<div class="filter-date">
					<input type="date"
						   id="filterCheckIn"
						   name="check_in"
						   form="filterForm"
						   th:value="${searchParams != null and searchParams['check_in'] != null ? searchParams['check_in'] : (searchParams != null and searchParams['checkIn'] != null ? searchParams['checkIn'] : '')}">
					<span>~</span>
					<input type="date"
						   id="filterCheckOut"
						   name="check_out"
						   form="filterForm"
						   th:value="${searchParams != null and searchParams['check_out'] != null ? searchParams['check_out'] : (searchParams != null and searchParams['checkOut'] != null ? searchParams['checkOut'] : '')}">
				</div>

				<button type="submit" form="filterForm" class="filter-search-btn">검색</button>
			</div>
		</div>
	</div>

	<hr>

	<div id="roomListArea">
		<div th:each="room : ${roomList}" class="room-card">
			<div class="room-image">
				<img th:src="@{${room.image_url}}"
					 onerror="this.src='/images/dining/default_dining.jpg'"
					 style="width: 100%; height: 100%; object-fit: cover;">
			</div>

			<div class="room-info">
				<div class="room-name">
					<a th:href="@{/room/detail(room_id=${room.room_type_id})}"
					   th:text="${room.room_name}"
					   style="text-decoration: none; color: black;"></a>
				</div>

				<div>등급: <span th:text="${room.room_grade}"></span></div>
				<div>침대: <span th:text="${room.bed_type}"></span></div>
				<div>전망: <span th:text="${room.view_type}"></span></div>

				<div th:class="'price price-' + ${room.room_type_id}">
					가격 조회 중 ...
				</div>

				<div style="margin-top: 20px;">
					<button id="reserveBtn" th:onclick="'handleReserveClick(' + ${room.room_type_id} + ')'">예약하기</button>
					<button th:onclick="'addToCompare(' + ${room.room_type_id} + ')'">비교하기</button>
				</div>
			</div>
		</div>
	</div>

	<div id="calendarModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5);">
		<div style="background: white; width: 900px; margin: 80px auto; padding: 30px; position: relative;">
			<button onclick="closeModal()" style="position: absolute; right: 10px; top: 10px;">X</button>
			<h2>날짜 선택</h2>
			<div id="calendar"></div>
		</div>
	</div>

	<div id="compareBar" style="position: fixed; bottom: 0; left: 0; width: 100%; background: #111; color: white; padding: 15px; display: none; z-index: 9999;">
		<div style="display: flex; justify-content: space-between; align-items: center;">
			<div id="compareItems"></div>
			<button onclick="openCompareModal()" style="background: #c9a76b; border: none; padding: 10px 20px;">비교하기</button>
		</div>
	</div>

	<div id="compareModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 10000;">
		<div style="background:white; width:1100px; margin:80px auto; padding:40px; border-radius:10px; box-shadow:0 10px 40px rgba(0,0,0,0.2); position:relative;">
			<button onclick="closeCompareModal()" style="position: absolute; right: 15px; top: 15px;">X</button>
			<h2>상품 비교 상세</h2>
			<div id="compareModalBody" style="margin-top: 30px;"></div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>

	<script>
let exchangeRates = { KRW: 1 };
let currentCurrency = "KRW";
let includeExtraFee = false;
let calendarData = [];
let currentRoomId = null;

let calendarInstance = null;
let selectedCheckIn = null;
let selectedCheckOut = null;

function openCalendar(roomId) {
    document.getElementById("calendarModal").style.display = "block";

    fetch(`/room/calendar?room_id=${roomId}`)
        .then(res => res.json())
        .then(data => {

            calendarData = data;

            const events = data.map(day => ({
                title: day.AVAILABLE_COUNT === 0 ? "예약마감" : calculateFinalPrice(day.FINAL_PRICE),
                start: day.STAY_DATE,
                allDay: true,
                color: day.AVAILABLE_COUNT === 0 ? "#999999" : ""
            }));

            const calendarEl = document.getElementById("calendar");

            if (calendarInstance !== null) {
                calendarInstance.destroy();
            }

            calendarInstance = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                height: 650,
                selectable: true,
                selectMirror: true,
                unselectAuto: false,

                select: function(info) {
                    let start = info.startStr;
                    let end = new Date(info.endStr);

                    end.setDate(end.getDate() - 1);

                    let adjustedEnd =
                        end.getFullYear() + "-"
                        + String(end.getMonth() + 1).padStart(2, '0') + "-"
                        + String(end.getDate()).padStart(2, '0');

                    const nights = calculateNights(start, adjustedEnd);

                    if (nights <= 0) {
                        return;
                    }

                    applyDateToPage(start, adjustedEnd);

                    selectedCheckIn = null;
                    selectedCheckOut = null;

                    closeModal();
                },

                dateClick: function(info) {
                    const clickedDay = data.find(d => d.STAY_DATE === info.dateStr);

                    if (clickedDay && clickedDay.AVAILABLE_COUNT === 0) {
                        alert("해당 날짜는 예약 마감입니다.");
                        return;
                    }

                    if (!selectedCheckIn) {
                        selectedCheckIn = info.dateStr;
                        return;
                    }

                    selectedCheckOut = info.dateStr;

                    if (new Date(selectedCheckOut) <= new Date(selectedCheckIn)) {
                        alert("체크아웃은 체크인 이후 날짜여야 합니다.");
                        selectedCheckOut = null;
                        return;
                    }

                    applyDateToPage(selectedCheckIn, selectedCheckOut);

                    selectedCheckIn = null;
                    selectedCheckOut = null;

                    closeModal();
                },

                selectAllow: function(selectInfo) {
                    const start = selectInfo.startStr;
                    const end = selectInfo.endStr;

                    const hasSoldOut = data.some(day =>
                        day.AVAILABLE_COUNT === 0 &&
                        day.STAY_DATE >= start &&
                        day.STAY_DATE < end
                    );

                    if (hasSoldOut) {
                        alert("선택한 날짜 중 예약 마감된 날짜가 있습니다.");
                        return false;
                    }

                    return true;
                },

                events: events
            });

            calendarInstance.render();
        });
}

function closeModal() {
    document.getElementById("calendarModal").style.display = "none";
}

function applyDateToPage(checkIn, checkOut) {
    const roomId = currentRoomId;
    const totalRoomPrice = calculateStayPrice(checkIn, checkOut);

    const currency = currentCurrency;
    const tax = includeExtraFee;

    location.href = `/reservation/form?room_type_id=${roomId}&check_in=${checkIn}&check_out=${checkOut}&room_price=${totalRoomPrice}&currency=${currency}&tax=${tax}`;
}

function calculateStayPrice(checkIn, checkOut) {
    let total = 0;

    calendarData.forEach(day => {
        if (day.STAY_DATE >= checkIn && day.STAY_DATE < checkOut) {
            total += day.FINAL_PRICE;
        }
    });

    return total;
}

function calculateNights(start, end) {
    const s = new Date(start);
    const e = new Date(end);
    const diff = e - s;
    return diff / (1000 * 60 * 60 * 24);
}

function handleReserveClick(roomId) {
    currentRoomId = roomId;
    openCalendar(roomId);
}

function getMinPrice(calendarData) {
    if (!calendarData || calendarData.length === 0) {
        return null;
    }
    return Math.min(...calendarData.map(d => d.FINAL_PRICE));
}

function loadMinPrice(roomId) {
    fetch(`/room/calendar?room_id=${roomId}`)
        .then(res => res.json())
        .then(data => {
            const minPrice = getMinPrice(data);
            const priceArea = document.querySelector(`.price-${roomId}`);

            if (!priceArea) return;

            if (minPrice) {
                priceArea.dataset.basePrice = minPrice;
                priceArea.innerText = "최저 " + calculateFinalPrice(minPrice) + " ~";
            } else {
                priceArea.innerText = "가격 정보 없음";
            }
        });
}

function loadRooms() {
    const hotel = document.querySelector("[name='hotel']").value;
    const roomGrade = document.querySelector("[name='room_grade']").value;
    const bedType = document.querySelector("[name='bed_type']").value;
    const viewType = document.querySelector("[name='view_type']").value;
    const capacity = document.querySelector("[name='capacity']").value;
    const sort = document.getElementById("sortSelect").value;

    const checkIn = document.getElementById("filterCheckIn").value;
    const checkOut = document.getElementById("filterCheckOut").value;

    let url = `/room/filter?hotel=${encodeURIComponent(hotel)}`
            + `&room_grade=${encodeURIComponent(roomGrade)}`
            + `&bed_type=${encodeURIComponent(bedType)}`
            + `&view_type=${encodeURIComponent(viewType)}`
            + `&capacity=${encodeURIComponent(capacity)}`
            + `&sort=${encodeURIComponent(sort)}`;

    if (checkIn && checkOut) {
        url += `&check_in=${encodeURIComponent(checkIn)}&check_out=${encodeURIComponent(checkOut)}`;
    }

    fetch(url)
        .then(res => res.json())
        .then(data => {

            const area = document.getElementById("roomListArea");
            area.innerHTML = "";

            if (data.length === 0) {
                area.innerHTML = "<p>검색 결과가 없습니다.</p>";
                return;
            }

            data.forEach(room => {

                let stockHtml = "";
                let reserveBtn;

                if (!checkIn || !checkOut) {
                    reserveBtn = `
                        <button onclick="handleReserveClick(${room.room_type_id})">
                            예약하기
                        </button>
                    `;
                } else {
                    if (room.availableCount === 0) {
                        stockHtml = `<div style="color:gray; font-weight:bold;">예약마감</div>`;
                        reserveBtn = `
                            <button disabled style="background:#ccc;">
                                예약불가
                            </button>
                        `;
                    } else if (room.availableCount < 3) {
                        stockHtml = `<div style="color:red; font-weight:bold;">⚠ 잔여 ${room.availableCount}개</div>`;
                        reserveBtn = `
                            <button onclick="handleReserveClick(${room.room_type_id})">
                                예약하기
                            </button>
                        `;
                    } else {
                        reserveBtn = `
                            <button onclick="handleReserveClick(${room.room_type_id})">
                                예약하기
                            </button>
                        `;
                    }
                }

                area.innerHTML += `
                    <div class="room-card">
                        <div class="room-image">
                            <img src="${room.image_url}"
                                 onerror="this.src='/images/dining/default_dining.jpg'"
                                 style="width:100%; height:100%; object-fit:cover;">
                        </div>
                        <div class="room-info">
                            <div class="room-name">
                                <a href="/room/detail?room_id=${room.room_type_id}">
                                    ${room.room_name}
                                </a>
                            </div>
                            <div>등급: ${room.room_grade}</div>
                            <div>침대: ${room.bed_type}</div>
                            <div>전망: ${room.view_type}</div>
                            <div class="price price-${room.room_type_id}">
                                가격 조회 중...
                            </div>
                            ${stockHtml}

                            <div style="margin-top:20px;">
                                ${reserveBtn}
                                <button onclick="addToCompare(${room.room_type_id})">
                                    비교하기
                                </button>
                            </div>
                        </div>
                    </div>
                `;

                loadMinPrice(room.room_type_id);
            });

            updatePricesByCurrency(currentCurrency);
        });
}

document.getElementById("filterForm").addEventListener("submit", function(e) {
    e.preventDefault();
    loadRooms();
});

document.getElementById("sortSelect").addEventListener("change", function() {
    loadRooms();
});

function addToCompare(roomId) {
    let compareList = JSON.parse(localStorage.getItem("compareList")) || [];
    const card = event.target.closest(".room-card");

    const name = card.querySelector(".room-name a").innerText;
    const image = card.querySelector(".room-image img").src;

    if (compareList.some(r => r.id === roomId)) {
        alert("이미 비교함에 추가된 객실입니다.");
        return;
    }

    if (compareList.length >= 3) {
        alert("최대 3개까지만 비교 가능합니다.");
        return;
    }

    compareList.push({
        id: roomId,
        name: name,
        image: image
    });

    localStorage.setItem("compareList", JSON.stringify(compareList));
    updateCompareFooter();
}

function updateCompareFooter() {
    let compareList = JSON.parse(localStorage.getItem("compareList")) || [];

    const bar = document.getElementById("compareBar");
    const items = document.getElementById("compareItems");

    items.innerHTML = "";

    if (compareList.length === 0) {
        bar.style.display = "none";
        return;
    }

    bar.style.display = "block";

    compareList.forEach(room => {
        items.innerHTML += `
            <div style="
                display:flex;
                align-items:center;
                margin-right:20px;
                background:white;
                color:black;
                padding:6px 12px;
                border-radius:5px;
            ">
                <img src="${room.image}"
                     style="width:60px;height:40px;object-fit:cover;margin-right:10px;">
                <span style="margin-right:10px;">${room.name}</span>
                <button onclick="removeFromCompare(${room.id})">X</button>
            </div>
        `;
    });
}

document.addEventListener("DOMContentLoaded", function() {
    const savedCurrency = localStorage.getItem("currency");

    if (savedCurrency) {
        currentCurrency = savedCurrency;
        document.getElementById("currencySelect").value = savedCurrency;
    }

    updateCompareFooter();
    loadExchangeRates();
});

function openCompareModal() {
    let compareList = JSON.parse(localStorage.getItem("compareList")) || [];

    if (compareList.length < 2) {
        alert("2개 이상 선택해주세요.");
        return;
    }

    const ids = compareList.map(r => r.id);

    const token = document.querySelector("meta[name='_csrf']").content;
    const header = document.querySelector("meta[name='_csrf_header']").content;

    fetch("/room/compare", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            [header]: token
        },
        body: JSON.stringify(ids)
    })
    .then(res => res.json())
    .then(data => {
        renderCompareModal(data);
    });
}

function removeFromCompare(roomId) {
    let compareList = JSON.parse(localStorage.getItem("compareList")) || [];
    compareList = compareList.filter(r => r.id !== roomId);

    localStorage.setItem("compareList", JSON.stringify(compareList));
    updateCompareFooter();
}

function renderCompareModal(data) {
    const modal = document.getElementById("compareModal");
    const body = document.getElementById("compareModalBody");

    let compareList = JSON.parse(localStorage.getItem("compareList")) || [];

    if (data.length === 0) {
        body.innerHTML = "<p>비교 데이터가 없습니다.</p>";
        modal.style.display = "block";
        return;
    }

    let html = `
        <table class="compare-table">
        <tr>
            <th>객실</th>
            ${compareList.map(r => `
                <th>
                    <img src="${r.image}" class="compare-room-img">
                    <div>${r.name}</div>
                </th>
            `).join("")}
        </tr>

        <tr>
            <td>가격</td>
            ${data.map(r => `
                <td class="compare-price" data-base-price="${r.base_price}">
                    ${calculateFinalPrice(r.base_price)}
                </td>
            `).join("")}
        </tr>

        <tr>
            <td>등급</td>
            ${data.map(r => `<td>${r.room_grade}</td>`).join("")}
        </tr>

        <tr>
            <td>침대</td>
            ${data.map(r => `<td>${r.bed_type}</td>`).join("")}
        </tr>

        <tr>
            <td>전망</td>
            ${data.map(r => `<td>${r.view_type}</td>`).join("")}
        </tr>
        </table>
    `;

    body.innerHTML = html;
    modal.style.display = "block";
}

function closeCompareModal() {
    document.getElementById("compareModal").style.display = "none";
}

function loadExchangeRates() {
    fetch("https://open.er-api.com/v6/latest/KRW")
        .then(response => response.json())
        .then(data => {
            exchangeRates = data.rates;
            exchangeRates["KRW"] = 1;
            console.log("환율 저장 완료");
        })
        .catch(error => {
            console.error("환율 API 오류:", error);
        });
}

function updatePricesByCurrency(currency) {
    currentCurrency = currency;

    document.querySelectorAll(".price").forEach(el => {
        const basePrice = Number(el.dataset.basePrice);

        if (basePrice) {
            el.innerText = "최저 " + calculateFinalPrice(basePrice) + " ~";
        }
    });
}

function formatCurrency(amount, currency) {
    return new Intl.NumberFormat('ko-KR', {
        style: 'currency',
        currency: currency
    }).format(amount);
}

document.getElementById("currencySelect").addEventListener("change", function() {
    currentCurrency = this.value;
    localStorage.setItem("currency", currentCurrency);
    updatePricesByCurrency(this.value);

    document.querySelectorAll(".compare-price").forEach(el => {
        const base = Number(el.dataset.basePrice);
        el.innerText = calculateFinalPrice(base);
    });

    if (calendarInstance !== null) {
        const currentRoomId = window.currentRoomId;
        if (currentRoomId) {
            openCalendar(currentRoomId);
        }
    }
});

function calculateFinalPrice(basePrice) {
    let price = basePrice;

    if (includeExtraFee) {
        price *= 1.1;
    }

    const rate = exchangeRates[currentCurrency] || 1;

    if (currentCurrency !== "KRW") {
        price *= rate;
    }

    return new Intl.NumberFormat('ko-KR', {
        style: 'currency',
        currency: currentCurrency
    }).format(price);
}

document.getElementById("extraFeeCheck").addEventListener("change", function() {
    includeExtraFee = this.checked;
    updatePricesByCurrency(currentCurrency);

    document.querySelectorAll(".compare-price").forEach(el => {
        const base = Number(el.dataset.basePrice);
        el.innerText = calculateFinalPrice(base);
    });

    if (calendarInstance !== null) {
        if (window.currentRoomId) {
            openCalendar(window.currentRoomId);
        }
    }
});
</script>

</div>
</body>
</html>
