<!DOCTYPE html>
<html th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::section})}"
      lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CIEL HOTEL | 공식 홈페이지</title>

    <th:block th:fragment="link">
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />
    </th:block>

    <style th:fragment="style" type="text/css">
        .main-visual { width: 100%; height: 100vh; position: relative; overflow: hidden; background-color: #000; }
        .main-slider, .slide-item { width: 100%; height: 100vh; }
        .slide-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .slick-arrow {
            position: absolute; top: 50%; transform: translateY(-50%); z-index: 1000 !important;
            cursor: pointer; background: rgba(0, 0, 0, 0.2) !important; border: none !important;
            width: 60px; height: 60px; border-radius: 50%; color: #fff !important;
            font-size: 24px; display: flex !important; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }
        .slick-arrow:hover { background: rgba(0, 0, 0, 0.5) !important; }
        .slick-prev { left: 40px; }
        .slick-next { right: 40px; }
        .slick-arrow:before { display: none !important; }

        .slider-progress-container { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); z-index: 150; display: flex; align-items: center; }
        .progress-bar-bg { width: 300px; height: 3px; background: rgba(255, 255, 255, 0.2); position: relative; overflow: hidden; border-radius: 2px; }
        .progress-bar-fill { position: absolute; top: 0; left: 0; width: 0%; height: 100%; background: #fff; }

        .weather-info { position: absolute; bottom: 50px; left: 50px; z-index: 100; }
        .weather-btn {
            background: rgba(0, 0, 0, 0.5); color: white; padding: 12px 35px; font-size: 1.1rem;
            font-weight: bold; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer; display: flex; align-items: center; transition: all 0.3s ease; outline: none;
        }
        .weather-btn:hover { background: rgba(0, 0, 0, 0.8); transform: scale(1.05); border-color: #d4af37; }
        .divider { margin: 0 15px; opacity: 0.6; }

        .fixed-reserve-btn {
            position: fixed; right: 40px; bottom: 40px; width: 90px; height: 90px;
            background-color: rgba(70, 60, 50, 0.85); color: white; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; z-index: 2500; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1);
        }
        .fixed-reserve-btn:hover { background-color: #d4af37; transform: scale(1.05); color: #000; }

        .reserve-quick-tab {
            position: fixed; right: 40px; bottom: 140px; width: 360px;
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px);
            border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: none; z-index: 2400; animation: slideUp 0.4s ease;
        }
        .reserve-quick-tab.active { display: block; }
        .tab-header { display: flex; background: #f4f4f4; border-radius: 15px 15px 0 0; overflow: hidden; }
        .tab-btn { flex: 1; padding: 18px; border: none; font-weight: 700; color: #666; transition: 0.3s; cursor: pointer; }
        .tab-btn.active { background: #1a1a1a; color: #fff; }
        .tab-body { padding: 30px; }

        .reserve-field {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: #f8f9fa; border: 1px solid #eee; border-radius: 5px;
            text-align: left; font-size: 0.95rem; display: block; color: #333; cursor: pointer;
        }
        .search-submit-btn { width: 100%; padding: 15px; background: #1a1a1a; color: #fff; border: none; border-radius: 5px; font-weight: 700; cursor: pointer; }

        .section-title { font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; }
        .room-img-container { width: 100%; aspect-ratio: 16 / 9; overflow: hidden; }
        .room-img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }

        .room-card, .dining-card { cursor: pointer; transition: 0.3s; }
        .room-card:hover .room-img-container img { transform: scale(1.05); }
        .dining-card:hover img { transform: scale(1.05); }

        .promo-img-wrapper { overflow: hidden; border-radius: 5px; transition: transform 0.3s ease; width: 100%; position: relative; cursor: pointer; }
        .promo-img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .promo-img-wrapper:hover img { transform: scale(1.05); }

        .discount-badge {
            position: absolute; top: 15px; left: 15px; background: #d4af37; color: #fff;
            padding: 5px 12px; font-weight: bold; border-radius: 3px; z-index: 5; font-size: 0.9rem;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .daterangepicker { margin-right: 330px !important; margin-top: -140px !important; border: 1px solid #d4af37 !important; z-index: 3000 !important; }
        .daterangepicker:before, .daterangepicker:after { display: none !important; }
    </style>

    <th:block th:fragment="script">
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>

        <script th:inline="javascript">
            function useNextFallback(img) {
                const raw = img.dataset.fallbacks || '';
                if (!raw) {
                    img.onerror = null;
                    return;
                }

                const list = raw.split('|').filter(Boolean);
                const tried = img.dataset.tried ? img.dataset.tried.split('|').filter(Boolean) : [];

                for (let i = 0; i < list.length; i++) {
                    const nextSrc = list[i];
                    if (!tried.includes(nextSrc) && img.src.indexOf(nextSrc) === -1) {
                        tried.push(nextSrc);
                        img.dataset.tried = tried.join('|');
                        img.src = nextSrc;
                        return;
                    }
                }

                img.onerror = null;
            }

            $(document).ready(function() {
                const $slider = $('.main-slider');
                const $progressBar = $('.progress-bar-fill');
                const speed = 4000;

                $slider.slick({
                    infinite: true,
                    autoplay: true,
                    autoplaySpeed: speed,
                    fade: true,
                    cssEase: 'linear',
                    arrows: true,
                    prevArrow: '<button type="button" class="slick-prev">〈</button>',
                    nextArrow: '<button type="button" class="slick-next">〉</button>',
                    pauseOnHover: false
                });

                function startProgressBar() {
                    $progressBar.css('width', '0%').stop().animate({ width: '100%' }, speed, 'linear');
                }

                $slider.on('beforeChange', function() {
                    $progressBar.stop().css('width', '0%');
                });

                $slider.on('afterChange', function() {
                    startProgressBar();
                });

                startProgressBar();

                $('input[name="daterange"]').daterangepicker({
                    autoUpdateInput: false,
                    minDate: moment(),
                    opens: 'left',
                    locale: {
                        format: 'YYYY-MM-DD',
                        applyLabel: "적용",
                        cancelLabel: "취소",
                        daysOfWeek: ["일", "월", "화", "수", "목", "금", "토"],
                        monthNames: ["1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"]
                    }
                });

                $('input[name="daterange"]').on('apply.daterangepicker', function(ev, picker) {
                    $(this).val(picker.startDate.format('YYYY-MM-DD') + ' ~ ' + picker.endDate.format('YYYY-MM-DD'));
                });
            });

            function toggleReserveTab() {
                $('#reserveQuickTab').toggleClass('active');
            }

            function switchReserveTab(type) {
                $('.tab-btn').removeClass('active');
                $('#reserveType').val(type);

                if (type === 'room') {
                    $('#tab-room-btn').addClass('active');
                    $('#room-fields').show();
                    $('#dining-fields').hide();
                }
                else {
                    $('#tab-dining-btn').addClass('active');
                    $('#room-fields').hide();
                    $('#dining-fields').show();
                }
            }
        </script>
    </th:block>
</head>

<body>
<section>
    <div class="main-visual">
        <div class="main-slider">
            <div class="slide-item-wrapper" th:each="banner : ${mainBannerList}">
                <div class="slide-item">
                    <img
                        th:with="
                            raw=${banner.image_url},
                            fileName=${raw != null and raw != '' ? (raw.contains('/') ? raw.substring(raw.lastIndexOf('/') + 1) : raw) : ''},
                            bannerImgSrc=${raw != null and raw != '' ?
                                (#strings.startsWith(raw, 'http') ? raw :
                                 (#strings.startsWith(raw, '/images/') ? raw :
                                  (#strings.startsWith(raw, 'images/') ? '/' + raw :
                                   (#strings.startsWith(raw, '/file_images/') ? raw :
                                    (#strings.startsWith(raw, 'file_images/') ? '/' + raw :
                                     (#strings.startsWith(raw, '/hotel/') ? '/file_images' + raw :
                                      (#strings.startsWith(raw, 'hotel/') ? '/file_images/' + raw :
                                       (#strings.startsWith(raw, '/banner/') ? '/file_images' + raw :
                                        (#strings.startsWith(raw, 'banner/') ? '/file_images/' + raw :
                                         (#strings.startsWith(raw, '/') ? raw : '/file_images/hotel/' + fileName)))))))))) :
                                '/images/hotel/ciel_main.jpg'},
                            bannerFallbacks=${fileName != '' ? '/images/hotel/' + fileName + '|/images/hotel/ciel_main.jpg' : '/images/hotel/ciel_main.jpg'}"
                        th:src="${bannerImgSrc}"
                        th:attr="data-fallbacks=${bannerFallbacks}"
                        th:alt="${banner.title}"
                        onerror="useNextFallback(this);">
                </div>

                <div class="room-info-overlay position-absolute" style="bottom: 25%; left: 5%; z-index: 10;">
                    <h6 class="text-white font-weight-bold mb-2"
                        style="opacity:0.9; font-size: 1.5rem; letter-spacing: 2px;"
                        th:text="${banner.title}">HOTEL NAME</h6>
                    <h5 class="text-white font-weight-bold mb-0"
                        style="font-size: 3.5rem; line-height: 1.2; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);"
                        th:utext="${banner.subtitle}">카피 문구</h5>
                </div>
            </div>
        </div>

        <div class="slider-progress-container">
            <div class="progress-bar-bg"><div class="progress-bar-fill"></div></div>
        </div>

        <div class="weather-info">
            <button type="button" class="weather-btn">
                2 ℃ <span class="divider">|</span> SEOUL <span class="divider">|</span> 03/05
            </button>
        </div>
    </div>

    <div class="fixed-reserve-btn" onclick="toggleReserveTab()">
        <i class="far fa-calendar-alt"></i>
        <span>예약하기</span>
    </div>

    <div id="reserveQuickTab" class="reserve-quick-tab">
        <form th:action="@{/search}" method="get">
            <div class="tab-header">
                <input type="hidden" name="reserveType" id="reserveType" value="room">
                <button type="button" class="tab-btn active" id="tab-room-btn" onclick="switchReserveTab('room')">객실</button>
                <button type="button" class="tab-btn" id="tab-dining-btn" onclick="switchReserveTab('dining')">다이닝</button>
            </div>

            <div class="tab-body">
                <select name="hotelId" class="reserve-field" required>
                    <option value="" disabled selected hidden>호텔 선택</option>
                    <th:block th:each="hotel : ${hotelList}">
                        <option th:value="${hotel.HOTEL_ID}" th:text="${hotel.HOTEL_NAME}"></option>
                    </th:block>
                </select>

                <div id="room-fields">
                    <input type="text" name="daterange" class="reserve-field" placeholder="체크인 / 체크아웃" readonly style="background-color: #fff;">
                    <select name="bedType" class="reserve-field">
                        <option value="">침대타입 전체</option>
                        <option value="DOUBLE">DOUBLE</option>
                        <option value="TWIN">TWIN</option>
                        <option value="KING">KING</option>
                    </select>
                </div>

                <div id="dining-fields" style="display: none;">
                    <select name="diningType" class="reserve-field">
                        <option value="">다이닝 전체</option>
                        <option value="dining">레스트랑</option>
                        <option value="bar">라운지 & 바</option>
                    </select>
                </div>

                <button type="submit" class="search-submit-btn">검색 하기</button>
            </div>
        </form>
    </div>

    <div class="container-fluid px-md-5 mt-5">
        <div class="row mb-5">
            <div class="col-12 d-flex justify-content-between align-items-end mb-3">
                <h3 class="section-title mb-0 w-100">객실</h3>
                <a th:href="@{/room/list}" class="more-btn text-muted" style="white-space:nowrap;">전체보기 ></a>
            </div>

            <div class="col-md-6 col-sm-12 mb-4" th:each="room : ${roomList}">
                <div class="room-card position-relative overflow-hidden rounded shadow-sm"
                     style="cursor: pointer;"
                     th:onclick="|location.href='@{/room/detail(room_id=${room.room_type_id})}'|">

                    <div class="room-img-container" style="aspect-ratio: 16 / 9; width: 100%; overflow: hidden; background: #f0f0f0;">
                        <img
                            th:with="
                                raw=${room.image_url},
                                fileName=${raw != null and raw != '' ? (raw.contains('/') ? raw.substring(raw.lastIndexOf('/') + 1) : raw) : ''},
                                roomImgSrc=${raw != null and raw != '' ?
                                    (#strings.startsWith(raw, 'http') ? raw :
                                     (#strings.startsWith(raw, '/images/') ? raw :
                                      (#strings.startsWith(raw, 'images/') ? '/' + raw :
                                       (#strings.startsWith(raw, '/file_images/') ? raw :
                                        (#strings.startsWith(raw, 'file_images/') ? '/' + raw :
                                         (#strings.startsWith(raw, '/room/') ? '/file_images' + raw :
                                          (#strings.startsWith(raw, 'room/') ? '/file_images/' + raw :
                                           (#strings.startsWith(raw, '/') ? raw : '/file_images/room/' + fileName)))))))) :
                                    '/images/js/room1.jpg'},
                                roomFallbacks=${fileName != '' ? '/images/room/' + fileName + '|/images/js/room1.jpg' : '/images/js/room1.jpg'}"
                            th:src="${roomImgSrc}"
                            th:attr="data-fallbacks=${roomFallbacks}"
                            class="w-100 h-100"
                            style="object-fit: cover; transition: transform 0.5s ease;"
                            onerror="useNextFallback(this);">
                    </div>

                    <div class="room-info-overlay position-absolute w-100 p-4"
                         style="bottom: 0; left: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8));">
                        <h6 class="text-white font-weight-bold mb-1"
                            style="opacity:0.8; font-size: 0.9rem;"
                            th:text="${room.brand_id == 1 ? 'Ciel Hotel' : 'Le Ciel'}">BRAND</h6>
                        <h5 class="text-white font-weight-bold mb-0"
                            style="font-size: 1.5rem;"
                            th:text="${room.room_name}">ROOM NAME</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid px-md-5">
        <div class="row mb-5 text-center">
            <div class="col-12 d-flex justify-content-between align-items-end mb-4">
                <h3 class="section-title mb-0 w-100 text-left">다이닝</h3>
                <a th:href="@{/dining/list}" class="more-btn text-muted" style="white-space:nowrap;">전체보기 ></a>
            </div>

            <div class="col-md-4 mb-4" th:each="dining : ${diningList}">
                <div class="dining-card overflow-hidden rounded mb-3"
                     style="height: 250px;"
                     th:onclick="|location.href='@{/dining/detail/{id}(id=${dining.dining_id})}'|">
                    <img
                        th:with="
                            raw=${dining.main_img},
                            fileName=${raw != null and raw != '' ? (raw.contains('/') ? raw.substring(raw.lastIndexOf('/') + 1) : raw) : ''},
                            diningImgSrc=${raw != null and raw != '' ?
                                (#strings.startsWith(raw, 'http') ? raw :
                                 (#strings.startsWith(raw, '/images/') ? raw :
                                  (#strings.startsWith(raw, 'images/') ? '/' + raw :
                                   (#strings.startsWith(raw, '/file_images/') ? raw :
                                    (#strings.startsWith(raw, 'file_images/') ? '/' + raw :
                                     (#strings.startsWith(raw, '/') ? raw : '/images/dining/' + fileName)))))) :
                                '/images/dining/default_dining.jpg'},
                            diningFallbacks=${fileName != '' ? '/file_images/dining/' + fileName + '|/images/dining/' + fileName + '|/images/dining/default_dining.jpg' : '/images/dining/default_dining.jpg'}"
                        th:src="${diningImgSrc}"
                        th:attr="data-fallbacks=${diningFallbacks}"
                        class="img-fluid w-100 h-100"
                        style="object-fit: cover; transition: 0.5s;"
                        onerror="useNextFallback(this);">
                </div>

                <p class="mb-1 font-weight-bold small text-muted" th:text="${dining.fk_hotel_id == 1 ? 'Ciel Hotel' : 'Le Ciel'}">지점명</p>
                <p class="font-weight-bold" style="font-size: 1.2rem;" th:text="${dining.name}">식당명</p>
            </div>
        </div>
    </div>

    <div class="container-fluid px-md-5 mt-5 pb-5">
        <div class="row">
            <div class="col-12 d-flex justify-content-between align-items-end mb-4">
                <h3 class="section-title mb-0 w-100">프로모션</h3>
                <a th:href="@{/promotion/list}" class="more-btn text-muted" style="white-space:nowrap;">전체보기 ></a>
            </div>
        </div>

        <div class="row align-items-start" th:if="${not #lists.isEmpty(promoCardList)}">
            <div class="col-md-4 mb-4" th:onclick="|location.href='@{/promotion/detail/{id}(id=${promoCardList[0].promotion_id})}'|">
                <div class="p-4 promo-img-wrapper" style="background-color: #a69689; min-height: 600px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <div th:if="${promoCardList[0].discount_rate > 0}" class="discount-badge" th:text="${#numbers.formatDecimal(promoCardList[0].discount_rate, 0, 0) + '% OFF'}"></div>

                    <div style="width: 85%; height: 70%; overflow: hidden; background: #fff; border-radius: 3px;">
                        <img
                            th:with="
                                raw=${promoCardList[0].image_url},
                                fileName=${raw != null and raw != '' ? (raw.contains('/') ? raw.substring(raw.lastIndexOf('/') + 1) : raw) : ''},
                                promoImgSrc=${raw != null and raw != '' ?
                                    (#strings.startsWith(raw, 'http') ? raw :
                                     (#strings.startsWith(raw, '/images/js/') ? raw :
                                      (#strings.startsWith(raw, 'images/js/') ? '/' + raw :
                                       (#strings.startsWith(raw, '/file_images/js/') ? raw :
                                        (#strings.startsWith(raw, 'file_images/js/') ? '/' + raw :
                                         (#strings.startsWith(raw, '/js/') ? '/file_images/js/' + fileName :
                                          (#strings.startsWith(raw, 'js/') ? '/file_images/js/' + fileName :
                                           (#strings.startsWith(raw, '/') ? raw : '/file_images/js/' + fileName)))))))) :
                                    '/images/js/spring_promo.jpg'},
                                promoFallbacks=${fileName != '' ? '/images/js/' + fileName + '|/images/js/spring_promo.jpg' : '/images/js/spring_promo.jpg'}"
                            th:src="${promoImgSrc}"
                            th:attr="data-fallbacks=${promoFallbacks}"
                            class="w-100 h-100"
                            style="object-fit: cover;"
                            onerror="useNextFallback(this);">
                    </div>

                    <div class="text-center text-white mt-4">
                        <p class="font-weight-bold mb-1" style="font-size: 1.3rem;" th:text="${promoCardList[0].title}">프로모션 제목</p>
                        <p class="small opacity-75 mb-2" th:utext="${promoCardList[0].benefits}">혜택 내용</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4 px-md-4">
                <div class="mb-5" th:if="${promoCardList.size() > 1}" th:onclick="|location.href='@{/promotion/detail/{id}(id=${promoCardList[1].promotion_id})}'|">
                    <div class="promo-img-wrapper" style="height: 260px;">
                        <img
                            th:with="
                                raw=${promoCardList[1].image_url},
                                fileName=${raw != null and raw != '' ? (raw.contains('/') ? raw.substring(raw.lastIndexOf('/') + 1) : raw) : ''},
                                promoImgSrc=${raw != null and raw != '' ?
                                    (#strings.startsWith(raw, 'http') ? raw :
                                     (#strings.startsWith(raw, '/images/js/') ? raw :
                                      (#strings.startsWith(raw, 'images/js/') ? '/' + raw :
                                       (#strings.startsWith(raw, '/file_images/js/') ? raw :
                                        (#strings.startsWith(raw, 'file_images/js/') ? '/' + raw :
                                         (#strings.startsWith(raw, '/js/') ? '/file_images/js/' + fileName :
                                          (#strings.startsWith(raw, 'js/') ? '/file_images/js/' + fileName :
                                           (#strings.startsWith(raw, '/') ? raw : '/file_images/js/' + fileName)))))))) :
                                    '/images/js/spring_promo.jpg'},
                                promoFallbacks=${fileName != '' ? '/images/js/' + fileName + '|/images/js/spring_promo.jpg' : '/images/js/spring_promo.jpg'}"
                            th:src="${promoImgSrc}"
                            th:attr="data-fallbacks=${promoFallbacks}"
                            onerror="useNextFallback(this);">
                    </div>
                    <span class="d-block font-weight-bold mt-3 text-dark" th:text="${promoCardList[1].title}">제목</span>
                </div>

                <div class="mb-4" th:if="${promoCardList.size() > 2}" th:onclick="|location.href='@{/promotion/detail/{id}(id=${promoCardList[2].promotion_id})}'|">
                    <div class="promo-img-wrapper" style="height: 380px;">
                        <img
                            th:with="
                                raw=${promoCardList[2].image_url},
                                fileName=${raw != null and raw != '' ? (raw.contains('/') ? raw.substring(raw.lastIndexOf('/') + 1) : raw) : ''},
                                promoImgSrc=${raw != null and raw != '' ?
                                    (#strings.startsWith(raw, 'http') ? raw :
                                     (#strings.startsWith(raw, '/images/js/') ? raw :
                                      (#strings.startsWith(raw, 'images/js/') ? '/' + raw :
                                       (#strings.startsWith(raw, '/file_images/js/') ? raw :
                                        (#strings.startsWith(raw, 'file_images/js/') ? '/' + raw :
